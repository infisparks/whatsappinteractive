<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp API GUI</title>
    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #6c757d;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --light-bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #212529;
            --border-color: #dee2e6;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--light-bg);
            margin: 0;
            padding: 20px;
            color: var(--text-color);
        }

        .container {
            max-width: 800px;
            margin: auto;
            padding: 0 15px;
        }

        h1, h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-control, .btn {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }
        
        .form-control:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: #0056b3;
        }
        
        .message-area {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }

        .message-area.success {
            background-color: #d4edda;
            color: #155724;
        }

        .message-area.error {
            background-color: #f8d7da;
            color: #721c24;
        }

        .button-section {
            border-top: 1px dashed var(--border-color);
            padding-top: 10px;
            margin-top: 15px;
        }

        .button-group {
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .toggle-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .toggle-btn {
            flex-grow: 1;
            background-color: var(--light-bg);
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
        }

        .toggle-btn.active {
            background-color: var(--primary-color);
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>WhatsApp API GUI</h1>
    <p style="text-align: center;">Scan the QR code in your terminal to connect, then use these forms to send messages.</p>

    <div class="card">
        <h2>Interactive Message (Text or Image with Buttons)</h2>
        <form id="interactive-message-form">
            <div class="form-group">
                <label for="interactive-jid">Recipient JID:</label>
                <input type="text" id="interactive-jid" class="form-control" placeholder="91xxxxxxxxxx@s.whatsapp.net" required>
            </div>
            <div class="form-group">
                <label for="interactive-body">Message Body / Image Caption:</label>
                <textarea id="interactive-body" class="form-control" rows="3" placeholder="This is the main message or caption." required></textarea>
            </div>
             <div class="form-group">
                <label for="interactive-footer">Footer Text:</label>
                <input type="text" id="interactive-footer" class="form-control" placeholder="Footer text goes here" required>
            </div>
            <div class="form-group">
                <label for="interactive-image-url">Image URL (Optional - leave blank for text-only message):</label>
                <input type="url" id="interactive-image-url" class="form-control" placeholder="https://example.com/image.png">
            </div>
           
            <div class="button-section" id="interactive-buttons-container">
                <label>Buttons (Add up to 3)</label>
                <div class="form-group button-group">
                    <label>Button 1:</label>
                    <div class="toggle-group">
                        <button type="button" class="toggle-btn active" data-type="reply">Reply Button</button>
                        <button type="button" class="toggle-btn" data-type="url">URL Button</button>
                    </div>
                    <input type="text" class="form-control display-text" placeholder="Display Text (e.g., 'Learn More')" required>
                    <input type="text" class="form-control id-url-field" placeholder="Button ID (e.g., 'reply-1')" required>
                </div>
            </div>
            <button type="button" class="btn" id="add-interactive-button" style="background-color: var(--success-color);">Add Another Button</button>
            <button type="submit" class="btn">Send Interactive Message</button>
            <div id="interactive-message-status" class="message-area"></div>
        </form>
    </div>

    <div class="card">
        <h2>Simple Text Message</h2>
        <form id="text-message-form">
            <div class="form-group">
                <label for="text-jid">Recipient JID:</label>
                <input type="text" id="text-jid" class="form-control" placeholder="91xxxxxxxxxx@s.whatsapp.net" required>
            </div>
            <div class="form-group">
                <label for="text-content">Message Text:</label>
                <textarea id="text-content" class="form-control" rows="3" placeholder="Hello, this is a test message!" required></textarea>
            </div>
            <button type="submit" class="btn">Send Text Message</button>
            <div id="text-message-status" class="message-area"></div>
        </form>
    </div>

    <div class="card">
        <h2>Legacy Button Message</h2>
        <form id="button-message-form">
            <div class="form-group">
                <label for="button-jid">Recipient JID:</label>
                <input type="text" id="button-jid" class="form-control" placeholder="91xxxxxxxxxx@s.whatsapp.net" required>
            </div>
            <div class="form-group">
                <label for="button-text">Message Text:</label>
                <textarea id="button-text" class="form-control" rows="3" placeholder="Choose an option:" required></textarea>
            </div>
            <div class="form-group">
                <label for="button-footer">Footer (Optional):</label>
                <input type="text" id="button-footer" class="form-control" placeholder="Powered by Baileys">
            </div>
            <div class="button-section">
                <div class="form-group">
                    <label for="button-1">Button 1 Display Text:</label>
                    <input type="text" id="button-1" class="form-control" placeholder="Option A" required>
                </div>
                <div class="form-group">
                    <label for="button-2">Button 2 Display Text (Optional):</label>
                    <input type="text" id="button-2" class="form-control" placeholder="Option B">
                </div>
                <div class="form-group">
                    <label for="button-3">Button 3 Display Text (Optional):</label>
                    <input type="text" id="button-3" class="form-control" placeholder="Option C">
                </div>
            </div>
            <button type="submit" class="btn">Send Button Message</button>
            <div id="button-message-status" class="message-area"></div>
        </form>
    </div>
</div>

<script>
    // Helper function to handle form submissions
    async function handleFormSubmit(event, endpoint, statusElementId) {
        event.preventDefault();
        const form = event.target;
        const statusElement = document.getElementById(statusElementId);
        
        statusElement.style.display = 'none';
        statusElement.textContent = '';
        statusElement.className = 'message-area';

        let payload;

        if (form.id === 'text-message-form') {
            payload = {
                jid: document.getElementById('text-jid').value,
                text: document.getElementById('text-content').value
            };
        } else if (form.id === 'button-message-form') {
            payload = {
                jid: document.getElementById('button-jid').value,
                text: document.getElementById('button-text').value,
                footer: document.getElementById('button-footer').value,
                button1: document.getElementById('button-1').value,
                button2: document.getElementById('button-2').value,
                button3: document.getElementById('button-3').value
            };
        } else if (form.id === 'interactive-message-form') {
            const buttons = [];
            document.querySelectorAll('#interactive-buttons-container .button-group').forEach(group => {
                const type = group.querySelector('.toggle-btn.active').dataset.type;
                const displayText = group.querySelector('.display-text').value;
                const idOrUrl = group.querySelector('.id-url-field').value;
                if (displayText && idOrUrl) {
                    if (type === 'reply') {
                        buttons.push({ type: 'reply', displayText: displayText, id: idOrUrl });
                    } else if (type === 'url') {
                        buttons.push({ type: 'url', displayText: displayText, url: idOrUrl });
                    }
                }
            });
            payload = {
                jid: document.getElementById('interactive-jid').value,
                body: document.getElementById('interactive-body').value,
                footer: document.getElementById('interactive-footer').value,
                imageUrl: document.getElementById('interactive-image-url').value,
                buttons: buttons
            };
        }

        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await response.json();

            statusElement.style.display = 'block';

            if (result.success) {
                statusElement.classList.add('success');
                statusElement.textContent = result.message;
            } else {
                statusElement.classList.add('error');
                statusElement.textContent = `Error: ${result.error || 'Unknown error'}`;
            }
        } catch (error) {
            statusElement.style.display = 'block';
            statusElement.classList.add('error');
            statusElement.textContent = `Request Failed: ${error.message}`;
        }
    }

    // Event listeners for forms
    document.getElementById('text-message-form').addEventListener('submit', (e) => handleFormSubmit(e, '/send-text-message', 'text-message-status'));
    document.getElementById('button-message-form').addEventListener('submit', (e) => handleFormSubmit(e, '/send-button-message', 'button-message-status'));
    document.getElementById('interactive-message-form').addEventListener('submit', (e) => handleFormSubmit(e, '/send-interactive-message', 'interactive-message-status'));

    // Dynamic button functionality for Interactive Message
    document.getElementById('add-interactive-button').addEventListener('click', () => {
        const container = document.getElementById('interactive-buttons-container');
        const buttonGroups = container.querySelectorAll('.button-group');
        if (buttonGroups.length < 3) {
            const newGroup = buttonGroups[0].cloneNode(true);
            newGroup.querySelector('label').textContent = `Button ${buttonGroups.length + 1}:`;
            newGroup.querySelector('.display-text').value = '';
            newGroup.querySelector('.id-url-field').value = '';
            newGroup.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
            newGroup.querySelector('.toggle-btn[data-type="reply"]').classList.add('active'); // Default to reply
            
            // Add a remove button to the new group
            const removeBtn = document.createElement('button');
            removeBtn.textContent = 'Remove Button';
            removeBtn.type = 'button';
            removeBtn.className = 'btn';
            removeBtn.style.backgroundColor = 'var(--danger-color)';
            removeBtn.onclick = () => newGroup.remove();
            newGroup.appendChild(removeBtn);

            container.appendChild(newGroup);
        } else {
            alert('You can only add a maximum of 3 buttons.');
        }
    });

    // Handle button type toggling using event delegation
    document.getElementById('interactive-buttons-container').addEventListener('click', (e) => {
        if (e.target.classList.contains('toggle-btn')) {
            const btn = e.target;
            const parentGroup = btn.closest('.toggle-group');
            const formGroup = btn.closest('.button-group');
            const idUrlField = formGroup.querySelector('.id-url-field');

            parentGroup.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (btn.dataset.type === 'reply') {
                idUrlField.placeholder = "Button ID (e.g., 'reply-1')";
                idUrlField.type = 'text';
            } else if (btn.dataset.type === 'url') {
                idUrlField.placeholder = "Button URL (e.g., 'https://google.com')";
                idUrlField.type = 'url';
            }
        }
    });
</script>

</body>
</html>
